<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>K⨆Rsh Chat</title>
<style>
body{margin:0;font-family:Arial;display:flex;height:100vh;background:#1e1f22;color:white;}
.sidebar{width:200px;background:#111;padding:10px;}
.logo{color:#7c5cff;font-size:22px;font-weight:bold;padding:10px;}
#users{margin-top:10px;font-size:14px;}
.chat{flex:1;display:flex;flex-direction:column;}
.header{padding:10px;background:#18191c;}
.messages{flex:1;padding:10px;overflow:auto;}
.msg{background:#2a2d36;margin:5px;padding:8px;border-radius:6px;}
.input{display:flex;padding:10px;background:#18191c;}
input{flex:1;padding:10px;border:none;border-radius:6px;outline:none;background:#2a2d36;color:white;}
button{margin-left:10px;padding:10px;background:#7c5cff;border:none;color:white;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">K⨆Rsh</div>
  <h4>کاربران آنلاین</h4>
  <div id="users"></div>
</div>

<div class="chat">
  <div class="header">💬 چت آنلاین</div>
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="msg" placeholder="پیام..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const name = prompt("نام خود را وارد کنید:");
socket.emit("join", name);

socket.on("users", (list)=>{
  document.getElementById("users").innerHTML =
    list.map(u => `<div>🟢 ${u}</div>`).join("");
});

socket.on("message", (m)=>{
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${m.user}</b>: ${m.text} <small>${m.time}</small>`;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
});

function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;
  socket.emit("message",{user:name,text});
  input.value = "";
}
</script>

</body>
</html>
