<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>k⨆Rsh - CS2 Hub</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#050505;
    color:white;
    overflow-x:hidden;
}

/* LOADER */
#intro-loader{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.loader-box{
    text-align:center;
}

.loader-bar{
    width:300px;
    height:10px;
    background:#111;
    margin:20px auto;
    border-radius:20px;
    overflow:hidden;
}

#progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff8c00,#00aaff);
}

/* BUTTON */
.btn{
    padding:12px 25px;
    border:none;
    cursor:pointer;
    border-radius:8px;
}

.primary{background:#ff8c00;color:black;}

/* SECTIONS */
.section{
    padding:80px 10%;
}

.card{
    background:#111;
    padding:20px;
    border-radius:12px;
    margin:10px;
}

/* MARKET */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.skin-card{
    background:#111827;
    padding:15px;
    border-radius:12px;
}

/* PLAYERS */
.player-list .card{
    display:inline-block;
    margin:10px;
}

/* PARTICLES */
.particle{
    position:fixed;
    width:5px;
    height:5px;
    background:#ff8c00;
    border-radius:50%;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="intro-loader">
    <div class="loader-box">
        <h1>k⨆Rsh</h1>

        <div class="loader-bar">
            <div id="progress"></div>
        </div>

        <p id="percent">0%</p>

        <button id="enterBtn" class="btn primary" style="display:none;">
            ENTER
        </button>

        <audio id="sound">
            <source src="startup.mp3">
        </audio>
    </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<!-- MARKET -->
<section class="section">
    <h2>🛒 Market</h2>

    <div class="grid">
        <div class="skin-card">AWP | Dragon Lore</div>
        <div class="skin-card">AK-47 | Fire Serpent</div>
        <div class="skin-card">Karambit | Doppler</div>
    </div>
</section>

<!-- PLAYERS -->
<section class="section">
    <h2>👥 Players</h2>

    <input id="name" placeholder="Enter name">
    <button class="btn primary" onclick="addPlayer()">Add</button>

    <div id="players" class="player-list"></div>
</section>

</div>

<script>

/* PARTICLES */
for(let i=0;i<30;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*10)+"s";
    document.body.appendChild(p);
}

/* LOADING */
let i=0;
let bar=document.getElementById("progress");
let percent=document.getElementById("percent");
let btn=document.getElementById("enterBtn");

let load=setInterval(()=>{
    i++;
    bar.style.width=i+"%";
    percent.innerText=i+"%";

    if(i>=100){
        clearInterval(load);
        btn.style.display="block";
    }
},30);

btn.onclick=()=>{
    document.getElementById("sound").play();
    document.getElementById("intro-loader").style.display="none";
    document.getElementById("main").style.display="block";
};

/* PLAYERS SYSTEM */
let players=JSON.parse(localStorage.getItem("players"))||[];

function render(){
    document.getElementById("players").innerHTML=
    players.map(p=>`<div class="card">🎮 ${p}</div>`).join("");
}

function addPlayer(){
    let name=document.getElementById("name").value;
    if(!name) return;

    players.push(name);
    localStorage.setItem("players",JSON.stringify(players));
    render();
}

render();

</script>

</body>
</html>
