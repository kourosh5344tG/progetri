<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>K⨆Rsh</title>

<style>
body{
    margin:0;
    background:#000;
    color:#0f0;
    font-family: monospace;
    overflow-x:hidden;
}

/* هدر */
header{
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:3px;
    text-shadow:0 0 10px #0f0;
}

/* کانتینر اخبار */
.news{
    width:80%;
    margin:40px auto;
    border:1px solid #0f0;
    padding:20px;
    box-shadow:0 0 20px #0f0;
}

.news h2{
    border-bottom:1px solid #0f0;
    padding-bottom:10px;
}

.item{
    margin:15px 0;
    padding:10px;
    border-left:3px solid #0f0;
}

/* دات دنبال موس */
.dot{
    position:fixed;
    width:10px;
    height:10px;
    background:#0f0;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 15px #0f0;
}
</style>
</head>

<body>

<header>K⨆Rsh - CS2 News Terminal</header>

<div class="news">
    <h2>آخرین اخبار CS2</h2>

    <div class="item">🎮 آپدیت جدید گرافیکی برای Counter-Strike 2 منتشر شد</div>
    <div class="item">🔥 تغییرات در سیستم رنکینگ Competitive</div>
    <div class="item">💣 نقشه Dust2 با بهینه‌سازی جدید برگشت</div>
    <div class="item">🧠 AI ضدچیت قوی‌تر شد</div>
</div>

<div class="dot" id="dot"></div>

<script>
const dot = document.getElementById("dot");

document.addEventListener("mousemove", (e)=>{
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
});
</script>

</body>
</html>
