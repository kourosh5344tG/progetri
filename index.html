<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K⨆Rsh VOID | CS2 GOD MODE HUB + AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#05070b;color:white;overflow-x:hidden;}

/* BACKGROUND */
.bg{
position:fixed;inset:0;z-index:-5;
background:
radial-gradient(circle at 20% 20%, rgba(255,106,0,0.18), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,140,0,0.12), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(255,60,0,0.08), transparent 50%),
linear-gradient(180deg,#04050a,#0b0f14);
animation:bgMove 12s infinite alternate;
}
@keyframes bgMove{0%{transform:scale(1);}100%{transform:scale(1.06);}}

/* GRID */
.grid{
position:fixed;inset:0;z-index:-4;
background-image:
linear-gradient(rgba(255,106,0,0.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,106,0,0.05) 1px,transparent 1px);
background-size:70px 70px;
opacity:0.3;
}

/* ORBS */
.glow span{
position:fixed;width:260px;height:260px;border-radius:50%;
background:#ff6a00;filter:blur(140px);opacity:0.12;
animation:float 10s infinite ease-in-out;
}
.glow span:nth-child(1){top:10%;left:10%;}
.glow span:nth-child(2){top:60%;left:70%;background:#ff9900;}
.glow span:nth-child(3){top:30%;left:40%;background:#ff3c00;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-40px);}100%{transform:translateY(0);}}

/* NAV */
nav{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:18px 8%;
background:rgba(10,12,16,0.6);
backdrop-filter:blur(14px);
z-index:999;
border-bottom:1px solid rgba(255,106,0,0.1);
}

.logo{
font-size:1.6rem;
font-weight:900;
color:#ff6a00;
text-shadow:0 0 18px rgba(255,106,0,0.6);
}

nav a{
color:#ccc;
text-decoration:none;
margin-left:20px;
transition:.3s;
}
nav a:hover{color:#ff6a00;}

/* HERO */
.hero{
min-height:100vh;
display:flex;
justify-content:space-between;
align-items:center;
padding:120px 8%;
}

.hero-left{width:55%;}

.tag{
display:inline-block;
padding:6px 12px;
border:1px solid #ff6a00;
border-radius:20px;
color:#ff6a00;
font-size:12px;
}

.hero-title{
font-size:4rem;
font-weight:900;
background:linear-gradient(90deg,#ff5e00,#ff9900,#ffd000);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#bbb;
margin-top:10px;
line-height:1.6;
max-width:500px;
}

.btn{
margin-top:20px;
display:inline-block;
padding:14px 28px;
background:#ff6a00;
color:#000;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

/* STATS */
.stats{display:flex;gap:15px;margin-top:30px;}
.stat{
padding:15px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,106,0,0.1);
border-radius:12px;
min-width:120px;
text-align:center;
}
.stat h2{color:#ff9900;}

/* SECTIONS */
section{padding:90px 8%;}
.title{text-align:center;font-size:2.2rem;color:#ff9900;margin-bottom:35px;}

.grid-section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,0.03);
padding:20px;
border-radius:14px;
border:1px solid rgba(255,106,0,0.1);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#ff6a00;
box-shadow:0 0 25px rgba(255,106,0,0.2);
}

.card h3{color:#ff6a00;}

/* HUD */
.killfeed{
position:fixed;
top:110px;
right:20px;
background:rgba(0,0,0,0.6);
padding:10px;
border-left:3px solid #ff6a00;
font-size:12px;
min-width:220px;
}

.toast{
position:fixed;
bottom:20px;
left:20px;
background:#111;
border-left:4px solid #ff6a00;
padding:12px;
border-radius:10px;
opacity:0;
transition:.4s;
}

/* SIGNUP */
input, button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-weight:bold;
}

button{
background:#ff6a00;
cursor:pointer;
}

/* AI CHAT */
#aiChat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:rgba(0,0,0,0.75);
border:2px solid #ff6a00;
border-radius:12px;
padding:10px;
z-index:1000;
}

#chatBox{
height:180px;
overflow-y:auto;
background:#111;
padding:8px;
border-radius:8px;
margin:8px 0;
font-size:13px;
}

#chatControls{
display:flex;
gap:5px;
}

#chatInput{
flex:1;
padding:8px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

#aiChat.minimized #chatBox,
#aiChat.minimized #chatControls{
display:none;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
color:#777;
border-top:1px solid rgba(255,255,255,0.05);
}

@media(max-width:900px){
.hero{flex-direction:column;text-align:center;}
.hero-left{width:100%;}
.hero-title{font-size:3rem;}
nav a{margin-left:10px;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="glow"><span></span><span></span><span></span></div>

<div class="killfeed" id="killfeed"></div>
<div class="toast" id="toast"></div>

<nav>
<div class="logo">K⨆Rsh VOID</div>
<div>
<a href="#home">Home</a>
<a href="#news">News</a>
<a href="#matches">Matches</a>
<a href="#players">Players</a>
<a href="#signup">Sign Up</a>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<div class="hero-left">
<div class="tag">GOD MODE ACTIVE</div>
<h1 class="hero-title">CS2 VOID HUB</h1>
<p>AI-powered esports dashboard with live stats, players, matches and smart assistant.</p>

<div class="stats">
<div class="stat"><h2 id="p">0</h2><p>Players</p></div>
<div class="stat"><h2 id="m">0</h2><p>Matches</p></div>
<div class="stat"><h2 id="t">0</h2><p>Tournaments</p></div>
</div>
</div>
</section>

<!-- NEWS -->
<section id="news">
<h2 class="title">NEWS</h2>
<div class="grid-section" id="newsBox"></div>
</section>

<!-- MATCHES -->
<section id="matches">
<h2 class="title">MATCHES</h2>
<div class="grid-section" id="matchBox"></div>
</section>

<!-- PLAYERS -->
<section id="players">
<h2 class="title">PLAYERS</h2>
<div class="grid-section" id="playerBox"></div>
</section>

<!-- SIGNUP -->
<section id="signup">
<h2 class="title">SIGN UP</h2>
<div class="grid-section">
<div class="card">
<input id="name" placeholder="Enter your name">
<button onclick="signup()">Join VOID</button>
<p id="msg" style="margin-top:10px;color:#ff9900;"></p>
</div>
</div>
</section>

<!-- AI CHAT -->
<div id="aiChat">
<div style="display:flex;justify-content:space-between;align-items:center;">
<h3 style="color:#ff9900;">AI Assistant</h3>
<div>
<button onclick="toggleChat()" style="background:#ff6a00;border:none;padding:5px 8px;border-radius:6px;">⛶</button>
<button onclick="clearChat()" style="background:#ff3c00;border:none;padding:5px 8px;border-radius:6px;">🧹</button>
</div>
</div>

<div id="chatBox"></div>

<div id="chatControls">
<input id="chatInput" placeholder="Ask me...">
<button onclick="send()">Send</button>
</div>
</div>

<footer>GOD MODE CS2 HUB © 2026</footer>

<script>

// DATA
const news=["CS2 update","Meta changes","Major tournament","Anti-cheat boost"];
const matches=["FaZe vs Vitality","NAVI vs G2","Spirit vs MOUZ","Heroic vs Astralis"];
const players=["s1mple","ZywOo","m0NESY","sh1ro","ropz"];

// RENDER
function render(id,data){
document.getElementById(id).innerHTML =
data.map(x=>`<div class="card"><h3>${x}</h3></div>`).join('');
}

render("newsBox",news);
render("matchBox",matches);
render("playerBox",players);

// STATS
document.getElementById("p").innerText = players.length * 12000;
document.getElementById("m").innerText = matches.length;
document.getElementById("t").innerText = 12;

// KILLFEED
setInterval(()=>{
const k=["Headshot","Triple kill","Clutch win","Knife kill"];
document.getElementById("killfeed").innerText="🔫 "+k[Math.floor(Math.random()*k.length)];
},2500);

// TOAST
setInterval(()=>{
let t=document.getElementById("toast");
t.innerText="🔥 Live update";
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,2000);
},6000);

// SIGNUP
function signup(){
let n=document.getElementById("name").value;
document.getElementById("msg").innerText=n?`Welcome ${n} 🚀`:"Enter name";
}

// AI CHAT
function send(){
let i=document.getElementById("chatInput");
let c=document.getElementById("chatBox");
let m=i.value.toLowerCase();
if(!m) return;

c.innerHTML+=`<div style="color:#ff6a00">You: ${m}</div>`;

let r="I don't understand.";
if(m.includes("news")) r="CS2 update live!";
else if(m.includes("match")) r="Next: FaZe vs Vitality";
else if(m.includes("player")) r="Top: s1mple, ZywOo";

c.innerHTML+=`<div style="color:#00ffcc">AI: ${r}</div>`;
c.scrollTop=c.scrollHeight;
i.value="";
}

// CLEAR CHAT
function clearChat(){
document.getElementById("chatBox").innerHTML="";
}

// TOGGLE MINIMIZE
function toggleChat(){
document.getElementById("aiChat").classList.toggle("minimized");
}

</script>

</body>
</html>
