<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>K⨆Rsh</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0d0d12;
color:#fff;
display:flex;
height:100vh;
}

/* sidebar */
.sidebar{
width:220px;
background:#111;
padding:10px;
border-right:1px solid #333;
}

.server{
padding:10px;
margin:5px 0;
background:#1a1a1a;
cursor:pointer;
border-radius:6px;
}

.server:hover{background:#333;}

/* main */
.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:10px;
border-bottom:1px solid #333;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:6px 0;
padding:5px;
border-bottom:1px solid #222;
}

.user{color:#0f0;}
.admin{color:#f55;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
background:#111;
border:none;
color:#fff;
}

button{
padding:10px;
background:#fff;
border:none;
cursor:pointer;
color:#000;
}

/* right panel */
.right{
width:240px;
background:#111;
border-left:1px solid #333;
padding:10px;
}

.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<!-- SERVERS -->
<div class="sidebar">
<h3>📡 Servers</h3>

<div class="server" onclick="setServer('K⨆Rsh')">K⨆Rsh Server</div>
<div class="server" onclick="setServer('Life')">Life</div>
<div class="server" onclick="setServer('News')">News</div>

</div>

<!-- CHAT -->
<div class="main">

<header>
<h2>K⨆Rsh DISCORD FINAL</h2>
<p id="status">Not logged in</p>
</header>

<div id="chat"></div>

<div class="inputBox">
<input id="msg" placeholder="پیام...">
<button onclick="send()">Send</button>
</div>

</div>

<!-- PANEL -->
<div class="right">

<h3>👤 Login</h3>
<input id="username" placeholder="نام">
<button onclick="login()">Login</button>

<hr>

<h3>🛡 Admin</h3>
<input id="target" placeholder="UID">
<button onclick="kick()">Kick</button>
<button onclick="ban()">Ban</button>

<p class="small">Role-based Discord system</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
doc,
setDoc,
getDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInAnonymously,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔴 Firebase config */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

signInAnonymously(auth);

let uid=null;
let name=null;
let role="user";
let server="K⨆Rsh";

const chatRef=collection(db,"chat");
const usersRef=collection(db,"users");
const banRef=collection(db,"banned");

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
uid=user.uid;
}
});

/* LOGIN */
window.login=async function(){
name=document.getElementById("username").value;
if(!name) return;

await setDoc(doc(usersRef,uid),{
uid,
name,
role:"user"
});

let snap=await getDoc(doc(usersRef,uid));
if(snap.exists()){
role=snap.data().role;
}

document.getElementById("status").innerText=
name+" | "+role;
}

/* SERVER SWITCH */
window.setServer=function(s){
server=s;
loadChat();
}

/* SEND */
window.send=async function(){

if(!uid) return alert("Login first");

let ban=await getDoc(doc(banRef,uid));
if(ban.exists()) return alert("BANNED");

let msg=document.getElementById("msg").value;
if(!msg) return;

await addDoc(chatRef,{
uid,
name,
text:msg,
server,
time:Date.now()
});

document.getElementById("msg").value="";
}

/* CHAT LOAD */
function loadChat(){
onSnapshot(query(chatRef),(snap)=>{
let chat=document.getElementById("chat");
chat.innerHTML="";

snap.forEach(d=>{
let data=d.data();
if(data.server!==server) return;

chat.innerHTML+=`
<div class="msg user">
<b>${data.name}</b>: ${data.text}
</div>`;
});

chat.scrollTop=chat.scrollHeight;
});
}

loadChat();

/* KICK */
window.kick=async function(){
if(role!=="admin") return alert("No permission");

let t=document.getElementById("target").value;
await deleteDoc(doc(usersRef,t));
alert("Kicked: "+t);
}

/* BAN */
window.ban=async function(){
if(role!=="admin") return alert("No permission");

let t=document.getElementById("target").value;

await setDoc(doc(banRef,t),{
banned:true
});

await deleteDoc(doc(usersRef,t));

alert("Banned: "+t);
}

</script>

</body>
</html>
